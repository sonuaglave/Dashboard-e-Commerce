<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Dashboard</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2 class="logo">⚡ SaaS Admin</h2>

        <nav>
          <a class="active">Dashboard</a>
          <a>Products</a>
          <a>Orders</a>
          <a>Customers</a>
          <a>Analytics</a>
          <a>Settings</a>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- TOP BAR -->
        <header class="topbar">
          <h1>Dashboard</h1>

          <div class="profile">
            <span>Admin</span>
            <div class="avatar"></div>
          </div>
        </header>

        <!-- CARDS -->
        <section class="grid">
          <div class="card">
            <h3>Revenue</h3>
            <p>$24,500</p>
          </div>

          <div class="card">
            <h3>Orders</h3>
            <p>1,240</p>
          </div>

          <div class="card">
            <h3>Customers</h3>
            <p>860</p>
          </div>

          <div class="card">
            <h3>Products</h3>
            <p>320</p>
          </div>
        </section>

        <!-- TABLE -->
        <section class="table-box">
          <h2>Recent Orders</h2>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Product</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>#1001</td>
                <td>John</td>
                <td>Laptop</td>
                <td class="success">Delivered</td>
              </tr>

              <tr>
                <td>#1002</td>
                <td>Emma</td>
                <td>Phone</td>
                <td class="pending">Pending</td>
              </tr>

              <tr>
                <td>#1003</td>
                <td>David</td>
                <td>Watch</td>
                <td class="failed">Cancelled</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
